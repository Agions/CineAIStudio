name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without v, e.g. 3.4.1)'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e . pyinstaller

      - name: Build with PyInstaller
        run: |
          set -e
          python -m PyInstaller \
            --clean \
            --onedir \
            --name Narrafiilm-${{ github.ref_name }}-linux-x86_64 \
            --add-data "resources:resources" \
            app/main.py

      - name: Package
        run: |
          set -e
          cd dist
          tar -czvf Narrafiilm-${{ github.ref_name }}-linux-x86_64.tar.gz \
            Narrafiilm-${{ github.ref_name }}-linux-x86_64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Narrafiilm ${{ github.ref_name }}
          draft: false
          files: dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
