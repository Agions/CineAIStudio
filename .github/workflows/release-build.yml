name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without v, e.g. 3.4.1)'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            artifact_ext: tar.xz
            pyinstaller_args: --add-data "resources:resources"
          - os: macos-latest
            platform: macos-x86_64
            artifact_ext: dmg
            pyinstaller_args: --add-data "resources:resources" --windowed
          - os: macos-14-latest
            platform: macos-arm64
            artifact_ext: dmg
            pyinstaller_args: --add-data "resources:resources" --windowed
          - os: windows-latest
            platform: windows-x86_64
            artifact_ext: zip
            pyinstaller_args: --add-data "resources;resources"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install UPX
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest) sudo apt-get install -y upx ;;
            macos-latest) brew install upx ;;
            windows-latest) choco install upx -y ;;
          esac

      - name: Install dependencies
        shell: bash
        run: |
          pip install -e . pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          set -e
          python -m PyInstaller \
            --clean \
            --onedir \
            --name Narrafiilm-${{ matrix.platform }} \
            ${{ matrix.pyinstaller_args }} \
            app/main.py

      - id: package
        name: Package artifact
        shell: bash
        run: |
          set -e
          cd dist

          case "${{ matrix.platform }}" in
            linux-*)
              tar -cvf Narrafiilm-${{ github.ref_name }}-${{ matrix.platform }}.tar \
                Narrafiilm-${{ matrix.platform }}
              xz -9 Narrafiilm-${{ github.ref_name }}-${{ matrix.platform }}.tar
              ARTIFACT="Narrafiilm-${{ github.ref_name }}-${{ matrix.platform }}.tar.xz"
              ;;
            macos-*)
              # Create .app bundle
              APP_NAME="Narrafiilm.app"
              mkdir -p "$APP_NAME/Contents/MacOS"
              mkdir -p "$APP_NAME/Contents/Resources"
              cp -r "Narrafiilm-${{ matrix.platform }}/"* "$APP_NAME/Contents/MacOS/"
              cp -r resources "$APP_NAME/Contents/"
              
              # Package as DMG
              hdiutil create -volname "Narrafiilm" -srcfolder "$APP_NAME" \
                -ov -format UDZO "Narrafiilm-${{ github.ref_name }}-${{ matrix.platform }}.dmg"
              ARTIFACT="Narrafiilm-${{ github.ref_name }}-${{ matrix.platform }}.dmg"
              ;;
            windows-*)
              powershell -Command "Compress-Archive -Force 'Narrafiilm-${{ matrix.platform }}\*' 'Narrafiilm-${{ github.ref_name }}-${{ matrix.platform }}.zip'"
              ARTIFACT="Narrafiilm-${{ github.ref_name }}-${{ matrix.platform }}.zip"
              ;;
          esac
          
          ls -lh
          echo "artifact=$ARTIFACT" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Narrafiilm-${{ matrix.platform }}
          path: dist/${{ steps.package.outputs.artifact }}
          retention-days: 3

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Narrafiilm ${{ github.ref_name }}
          draft: false
          files: dist/${{ steps.package.outputs.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}