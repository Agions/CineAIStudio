name: PR Check

# PR 事件：快速验证（lint + test，不构建 docs）
on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install ruff
      - run: |
          ruff check app/ tests/ --output-format=github \
            --ignore E501,F401 \
            --ignore E402 \
            --ignore F541,F811 \
            --ignore N802 \
            --ignore B904,B007 \
            --ignore SIM102,SIM108,SIM118 \
            --ignore W292,E401,E701

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -e ".[all,dev]"
      - run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing
