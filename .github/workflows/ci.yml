name: CI

# main 分支推送：全量检查（lint + type + test + docs build）
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install ruff
      - run: |
          ruff check app/ tests/ --output-format=github \
            --ignore E501,F401 \
            --ignore E402 \
            --ignore F541,F811 \
            --ignore N802 \
            --ignore B904,B007 \
            --ignore SIM102,SIM108,SIM118 \
            --ignore W292,E401,E701

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -e ".[dev]"
      - run: ruff check app/ --select F,E,N,W,B,C4,SIM --ignore E501,F401

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'
      - run: pip install -e ".[all,dev]"
      # 所有测试均可运行，无 ignore（skipped 仅因 @pytest.mark.skip 装饰器，合法跳过）
      - run: pytest tests/ -v --tb=short

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install
        working-directory: docs
      - run: pnpm run docs:build
        working-directory: docs
