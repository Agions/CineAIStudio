name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # 语法检查
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Lint with ruff
        run: |
          uv pip install --system ruff
          ruff check app/ tests/ \
            --exclude app/ui/ \
            --select F,E,N,W,B,C4,SIM \
            --ignore E501,F401,F841,E731,F821,I001,UP009,UP006,UP035,UP045,W291,W293,B904,E402,F541,SIM102,SIM105,SIM103,SIM108,SIM110,SIM112,B007,B027,W292,C408,B905,SIM117,N999,N801,N806,SIM118,SIM201,SIM113,E722,B024,F811

  # 类型检查
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[all,dev]" pyright

      - name: Run mypy
        run: |
          mypy app/ tests/ --ignore-missing-imports || true

      - name: Run pyright
        run: |
          pyright app/ 2>&1 | tee pyright_report.txt || true
          # 记录错误数（当前 1100+，逐步消减）
          echo "Pyright errors: $(grep -c 'error:' pyright_report.txt || echo 0)"

  # 测试
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          pip install --break-system-packages -e ".[all,dev]"

      - name: Run tests
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: success()
        run: |
          echo "Coverage report generated"
