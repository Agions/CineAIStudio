name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # 语法检查
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Lint with ruff
        run: |
          uv pip install --system ruff
          ruff check app/ tests/

  # 类型检查
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[all,dev]" pyright

      - name: Run mypy
        run: |
          mypy app/ tests/ --ignore-missing-imports

      - name: Run pyright
        run: |
          pyright app/ 2>&1 | tee pyright_report.txt || true
          # 记录错误数（当前 1100+，逐步消减）
          echo "Pyright errors: $(grep -c 'error:' pyright_report.txt || echo 0)"

  # 测试
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[all,dev]"

      - name: Run tests
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: success()
        run: |
          echo "Coverage report generated"
