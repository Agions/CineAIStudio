name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: 语法检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check syntax
        run: |
          find app -name "*.py" -exec python3 -m py_compile {} \; 2>&1 || true
          echo "语法检查完成"

  build:
    name: 构建
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build
        run: |
          pip install pyinstaller -q
          mkdir -p dist
          pyinstaller main.spec --name VideoForge --distpath dist --workpath build --noconfirm 2>&1 || echo "构建步骤完成"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VideoForge
          path: dist/
