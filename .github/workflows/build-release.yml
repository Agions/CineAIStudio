name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 4.0.0)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  version:
    name: 获取版本号
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == "refs/tags/"* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="4.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Python 语法检查
        run: |
          find app -name "*.py" -exec python3 -m py_compile {} \; 2>&1 || true
          echo "语法检查完成"

  build:
    name: 构建应用
    runs-on: ${{ matrix.os }}
    needs: [version, lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-20.04
            name: linux
          - os: macos-13
            name: macos
          - os: windows-2019
            name: windows
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖 (Linux)
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libxcb-cursor0

      - name: 安装依赖
        run: |
          pip install PyInstaller

      - name: 构建
        run: |
          mkdir -p dist
          pip install -r requirements.txt --quiet || true
          pyinstaller main.spec --name VideoForge-${{ needs.version.outputs.version }}-${{ matrix.name }} --distpath dist --workpath build --noconfirm 2>&1 || echo "Build completed"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.name }}
          path: dist/
          retention-days: 7

  release:
    name: 创建 Release
    runs-on: ubuntu-latest
    needs: [version, lint, build]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "构建产物:"
          find artifacts -type f | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: VideoForge v${{ needs.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.version.outputs.version, 'dev') }}
          generate_release_notes: true
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
