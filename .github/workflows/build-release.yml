name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: 语法检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check syntax
        run: |
          find app -name "*.py" -exec python3 -m py_compile {} \; 2>&1 || true
          echo "语法检查完成"

  build:
    name: 构建
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Build
        run: |
          echo "=== 目录结构 ==="
          ls -la
          echo "=== PyInstaller 版本 ==="
          pyinstaller --version
          echo "=== 构建 ==="
          pyinstaller --clean --onedir --name VideoForge app/main.py 2>&1
          echo "=== 构建结果 ==="
          ls -la dist/ 2>/dev/null || echo "dist not created"
      - name: Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VideoForge
          path: dist/
          retention-days: 7
