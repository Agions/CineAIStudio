name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: 语法检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check syntax
        run: |
          find app -name "*.py" -exec python3 -m py_compile {} \; 2>&1 || true
          echo "语法检查完成"

  build:
    name: 构建
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Create dirs
        run: mkdir -p dist build
      - name: Build
        run: |
          echo "=== 配置文件 ===" && ls -la *.spec 2>/dev/null || echo "No spec file"
          echo "=== 开始构建 ==="
          pyinstaller main.spec --name VideoForge --distpath dist --workpath build --noconfirm 2>&1
          echo "=== 构建结果 ==="
          ls -la dist/ 2>/dev/null || echo "dist is empty"
          ls -la build/ 2>/dev/null || echo "build is empty"
      - name: Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VideoForge-build
          path: dist/
          retention-days: 7
