name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v3.4.0)'
        required: false

permissions:
  contents: write

jobs:
  version:
    name: 获取版本
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tagged_version=${VERSION#v}" >> $GITHUB_OUTPUT

  lint:
    name: 语法检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: pip install uv
      - name: Lint
        run: |
          uv pip install -e . --system
          find app -name "*.py" -exec python3 -m py_compile {} \; 2>&1 || true

  build:
    name: 构建 (PyInstaller)
    runs-on: ubuntu-latest
    needs: [version, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: |
          uv pip install -e . --system
          pip install pyinstaller
      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --onedir \
            --name Narrafiilm-${{ needs.version.outputs.tagged_version }} \
            --add-data resources:resources \
            app/main.py 2>&1
      - name: Package
        run: |
          cd dist
          tar -czvf Narrafiilm-${{ needs.version.outputs.tagged_version }}-linux-x86_64.tar.gz \
            Narrafiilm-${{ needs.version.outputs.tagged_version }}
          ls -la
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Narrafiilm-${{ needs.version.outputs.tagged_version }}-linux-x86_64
          path: dist/*.tar.gz
          retention-days: 5

  release:
    name: 发布 Release
    runs-on: ubuntu-latest
    needs: [version, build]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Narrafiilm-${{ needs.version.outputs.tagged_version }}-linux-x86_64
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: Narrafiilm ${{ needs.version.outputs.tagged_version }}
          draft: false
          prerelease: ${{ contains(needs.version.outputs.version, 'dev') }}
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
