name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --no-lock -e ".[all,dev]"

      - name: Run unit tests
        run: |
          pytest tests/ -v -m "not integration" --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: success()
        run: |
          echo "Coverage report generated"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --no-lock -e ".[all,dev]"

      - name: Run integration tests
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GLM5_API_KEY: ${{ secrets.GLM5_API_KEY }}
        run: |
          pytest tests/ -v -m "integration" || true
