# VideoForge AI LLM 配置 (2026年3月最新)

LLM:
  # 默认提供商 (qwen | kimi | glm5 | openai | deepseek | claude | gemini | local)
  default_provider: "qwen"

  # 通义千问 Qwen 3.5 (2026年2月最新)
  qwen:
    enabled: true
    api_key: ${QWEN_API_KEY}
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen3.5"
    max_tokens: 8000
    temperature: 0.7
    top_p: 0.9

  # DeepSeek R1 / V3.2 (2026年3月最新)
  deepseek:
    enabled: false
    api_key: ${DEEPSEEK_API_KEY}
    base_url: "https://api.deepseek.com"
    model: "deepseek-v3-2"
    max_tokens: 16384
    temperature: 0.7

  # Kimi K2.5
  kimi:
    enabled: false
    api_key: ${KIMI_API_KEY}
    base_url: "https://api.moonshot.cn/v1"
    model: "kimi-k2.5"
    max_tokens: 2000
    temperature: 0.7

  # 智谱 GLM-5
  glm5:
    enabled: false
    api_key: ${GLM5_API_KEY}
    base_url: "https://open.bigmodel.cn/api/paas/v4/"
    model: "glm-5"
    max_tokens: 2000
    temperature: 0.7

  # OpenAI GPT-5.3 (2026年3月最新)
  openai:
    enabled: false
    api_key: ${OPENAI_API_KEY}
    base_url: "https://api.openai.com/v1"
    model: "gpt-5.3-instant"
    max_tokens: 16384
    temperature: 0.7

  # Anthropic Claude 4.x
  claude:
    enabled: false
    api_key: ${CLAUDE_API_KEY}
    base_url: "https://api.anthropic.com"
    model: "claude-sonnet-4-20250514"
    max_tokens: 2000
    temperature: 0.7

  # Google Gemini 3.1 (2026年3月最新)
  gemini:
    enabled: false
    api_key: ${GEMINI_API_KEY}
    base_url: "https://generativelanguage.googleapis.com"
    model: "gemini-2.5-flash-lite"
    max_tokens: 8000
    temperature: 0.7
