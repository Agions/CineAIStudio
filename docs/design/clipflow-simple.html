<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipFlow - AI 视频创作</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           CLIPFLOW - AI 视频创作工具
           设计理念：极简、AI 优先、内容为王
           ============================================================ */
        
        :root {
            --bg: #0A0A0B;
            --bg-elevated: #141416;
            --bg-card: #1A1A1D;
            --border: #2A2A2E;
            --text: #FAFAFA;
            --text-dim: #71717A;
            --accent: #00D4FF;
            --accent-dim: rgba(0, 212, 255, 0.15);
            --success: #22C55E;
            --radius: 12px;
            --font: 'Noto Sans SC', -apple-system, sans-serif;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* ============================================================
           头部
           ============================================================ */
        
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }
        
        .logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #A855F7);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        .nav {
            display: flex;
            gap: 8px;
        }
        
        .nav-item {
            padding: 8px 16px;
            font-size: 14px;
            color: var(--text-dim);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .nav-item:hover {
            background: var(--bg-elevated);
            color: var(--text);
        }
        
        .nav-item.active {
            background: var(--accent-dim);
            color: var(--accent);
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
        }
        
        /* ============================================================
           主区域 - 单页布局
           ============================================================ */
        
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 0;
        }
        
        /* 左侧 - 工作区 */
        .workspace {
            padding: 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--border);
        }
        
        .drop-zone {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 16/9;
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--bg-elevated);
            position: relative;
            overflow: hidden;
        }
        
        .drop-zone:hover {
            border-color: var(--accent);
            background: var(--accent-dim);
        }
        
        .drop-zone.has-file {
            border-style: solid;
            border-color: var(--success);
        }
        
        .drop-icon {
            font-size: 48px;
            opacity: 0.5;
        }
        
        .drop-text {
            font-size: 16px;
            color: var(--text-dim);
        }
        
        .drop-text strong {
            color: var(--accent);
        }
        
        .file-info {
            display: none;
            text-align: center;
        }
        
        .drop-zone.has-file .drop-icon,
        .drop-zone.has-file .drop-text {
            display: none;
        }
        
        .drop-zone.has-file .file-info {
            display: block;
        }
        
        .file-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .file-meta {
            font-size: 14px;
            color: var(--text-dim);
        }
        
        /* 右侧 - AI 功能面板 */
        .ai-panel {
            background: var(--bg);
            padding: 32px;
            overflow-y: auto;
        }
        
        .panel-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .panel-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--accent);
            border-radius: 2px;
        }
        
        /* AI 功能卡片 */
        .ai-cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .ai-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .ai-card:hover {
            border-color: var(--accent);
            transform: translateX(-4px);
        }
        
        .ai-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .ai-card.disabled:hover {
            border-color: var(--border);
            transform: none;
        }
        
        .ai-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .ai-card-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-dim);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .ai-card-title {
            font-size: 15px;
            font-weight: 600;
        }
        
        .ai-card-desc {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.5;
        }
        
        /* 进度状态 */
        .ai-card.processing {
            border-color: var(--accent);
        }
        
        .ai-card.processing .ai-card-header::after {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            margin-left: auto;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .ai-card.done {
            border-color: var(--success);
        }
        
        .ai-card.done .ai-card-header::after {
            content: '✓';
            color: var(--success);
            font-size: 14px;
            font-weight: bold;
        }
        
        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .btn-primary {
            background: var(--accent);
            color: #000;
        }
        
        .btn-primary:hover {
            opacity: 0.9;
            box-shadow: 0 0 20px var(--accent-dim);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .btn-secondary {
            background: var(--bg-elevated);
            color: var(--text);
            border: 1px solid var(--border);
        }
        
        .btn-secondary:hover {
            border-color: var(--accent);
        }
        
        /* 底部状态栏 */
        footer {
            padding: 12px 32px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-dim);
        }
        
        /* ============================================================
           响应式
           ============================================================ */
        
        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
            }
            
            .workspace {
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            
            .ai-panel {
                padding: 24px;
            }
        }
        
        /* ============================================================
           简化版专用样式
           ============================================================ */
        
        /* 极简设置区 */
        .settings-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .form-label {
            font-size: 12px;
            color: var(--text-dim);
        }
        
        .form-input,
        .form-select {
            padding: 10px 12px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
        }
        
        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        /* 结果预览 */
        .result-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            display: none;
        }
        
        .result-section.visible {
            display: block;
        }
        
        .result-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text);
        }
        
        .result-preview {
            background: var(--bg-elevated);
            border-radius: 8px;
            padding: 16px;
            font-size: 13px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .result-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        
        /* 导出选项 */
        .export-options {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }
        
        .export-format {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .format-btn {
            flex: 1;
            padding: 10px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-dim);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .format-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }
        
        .format-btn.active {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <header>
        <div class="logo">
            <div class="logo-icon">⚡</div>
            <span>ClipFlow</span>
        </div>
        
        <nav class="nav">
            <div class="nav-item active">AI 创作</div>
            <div class="nav-item">项目</div>
            <div class="nav-item">设置</div>
        </nav>
        
        <div class="header-actions">
            <button class="btn btn-secondary">保存</button>
        </div>
    </header>
    
    <!-- 主区域 -->
    <main>
        <!-- 左侧工作区 -->
        <section class="workspace">
            <div class="drop-zone" id="dropZone">
                <div class="drop-icon">📹</div>
                <div class="drop-text">
                    拖拽视频到这里<br>
                    或 <strong>点击选择文件</strong>
                </div>
                <div class="file-info">
                    <div class="file-name">video_demo.mp4</div>
                    <div class="file-meta">1920×1080 • 02:34 • 45MB</div>
                </div>
            </div>
        </section>
        
        <!-- 右侧 AI 功能面板 -->
        <aside class="ai-panel">
            <h2 class="panel-title">AI 功能</h2>
            
            <div class="ai-cards">
                <!-- AI 解说 -->
                <div class="ai-card disabled" id="cardCommentary">
                    <div class="ai-card-header">
                        <div class="ai-card-icon">🎙️</div>
                        <div class="ai-card-title">AI 解说</div>
                    </div>
                    <div class="ai-card-desc">
                        分析视频内容，自动生成解说词并配音
                    </div>
                </div>
                
                <!-- 字幕提取 -->
                <div class="ai-card" id="cardSubtitle">
                    <div class="ai-card-header">
                        <div class="ai-card-icon">📝</div>
                        <div class="ai-card-title">字幕生成</div>
                    </div>
                    <div class="ai-card-desc">
                        Whisper 语音识别，自动生成字幕
                    </div>
                </div>
                
                <!-- Beat Sync -->
                <div class="ai-card" id="cardBeatSync">
                    <div class="ai-card-header">
                        <div class="ai-card-icon">🎵</div>
                        <div class="ai-card-title">Beat-Sync 混剪</div>
                    </div>
                    <div class="ai-card-desc">
                        自动对齐节拍，制作节奏感强的混剪
                    </div>
                </div>
                
                <!-- 视频分析 -->
                <div class="ai-card" id="cardAnalysis">
                    <div class="ai-card-header">
                        <div class="ai-card-icon">🔍</div>
                        <div class="ai-card-title">质量分析</div>
                    </div>
                    <div class="ai-card-desc">
                        检测分辨率、亮度、音频等问题
                    </div>
                </div>
            </div>
            
            <!-- 设置区域 -->
            <div class="settings-row" style="margin-top: 32px;">
                <div class="form-group">
                    <label class="form-label">模板</label>
                    <select class="form-select" id="templateSelect">
                        <option>B站知识解说</option>
                        <option>电影解说</option>
                        <option>产品测评</option>
                        <option>自定义</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">配音</label>
                    <select class="form-select" id="voiceSelect">
                        <option>晓雅（女声）</option>
                        <option>云飞（男声）</option>
                    </select>
                </div>
            </div>
            
            <!-- 结果预览 -->
            <div class="result-section" id="resultSection">
                <div class="result-title">生成结果</div>
                <div class="result-preview" id="resultPreview">
                    这里是生成的字幕或解说内容预览...
                </div>
                <div class="result-actions">
                    <button class="btn btn-secondary" style="flex:1">复制</button>
                    <button class="btn btn-primary" style="flex:1">导出</button>
                </div>
            </div>
            
            <!-- 导出选项 -->
            <div class="export-options">
                <div class="form-label" style="margin-bottom: 12px;">导出格式</div>
                <div class="export-format">
                    <div class="format-btn active">MP4</div>
                    <div class="format-btn">SRT</div>
                    <div class="format-btn">TXT</div>
                    <div class="format-btn">剪映</div>
                </div>
                <button class="btn btn-primary" style="width: 100%;">
                    导出视频
                </button>
            </div>
        </aside>
    </main>
    
    <!-- 底部状态栏 -->
    <footer>
        <span>就绪</span>
        <span>ClipFlow v2.0 • AI 模型: GPT-4</span>
    </footer>
    
    <script>
        // 简单的交互逻辑
        const dropZone = document.getElementById('dropZone');
        const cardSubtitle = document.getElementById('cardSubtitle');
        const resultSection = document.getElementById('resultSection');
        
        // 模拟文件拖拽
        dropZone.addEventListener('click', () => {
            dropZone.classList.add('has-file');
        });
        
        // 模拟字幕生成
        cardSubtitle.addEventListener('click', () => {
            if (cardSubtitle.classList.contains('disabled')) return;
            
            cardSubtitle.classList.add('processing');
            
            setTimeout(() => {
                cardSubtitle.classList.remove('processing');
                cardSubtitle.classList.add('done');
                resultSection.classList.add('visible');
            }, 2000);
        });
        
        // 格式选择
        document.querySelectorAll('.format-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
    </script>
</body>
</html>
